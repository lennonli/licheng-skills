name: Notify AI site rebuild

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AI_SITE_DISPATCH_TOKEN }}
    steps:
      - name: Trigger licheng-ai-site deployment
        run: |
          gh api \
            --method POST \
            repos/lennonli/licheng-ai-site/dispatches \
            -f event_type=source-updated \
            -f "client_payload[repository]=${GITHUB_REPOSITORY}" \
            -f "client_payload[ref]=${GITHUB_REF_NAME}" \
            -f "client_payload[sha]=${GITHUB_SHA}"
